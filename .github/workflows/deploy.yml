name: Deploy to Azure

# Triggers only after the CI workflow completes successfully on main
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout (pin to the exact SHA that passed CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Build & push web image ────────────────────────────────────────────
      - name: Build and push — web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/priovex-web:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/priovex-web:${{ github.event.workflow_run.head_sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          # Use previous latest as layer cache — dramatically speeds up rebuilds
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/priovex-web:latest
          cache-to: type=inline

      # ── Build & push workers image ────────────────────────────────────────
      - name: Build and push — workers
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/workers/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/priovex-workers:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/priovex-workers:${{ github.event.workflow_run.head_sha }}
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/priovex-workers:latest
          cache-to: type=inline

      # ── Upload nginx config (volume-mounted, not inside a Docker image) ─────
      - name: Upload nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "nginx/default.conf"
          target: "/opt/priovex/nginx/"
          strip_components: 1

      # ── SSH into VM and roll out ──────────────────────────────────────────
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: ACR_LOGIN_SERVER,ACR_USERNAME,ACR_PASSWORD,IMAGE_TAG
          script: |
            set -e
            cd /opt/priovex

            # Authenticate with ACR
            echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin

            # Expose vars for docker-compose.prod.yml image substitution
            export ACR_LOGIN_SERVER="$ACR_LOGIN_SERVER"
            export IMAGE_TAG="$IMAGE_TAG"

            # Pull exact-SHA images just built in CI
            docker compose -f docker-compose.prod.yml pull web workers

            # Run DB migrations before switching traffic (uses DATABASE_DIRECT_URL from .env.prod)
            docker compose -f docker-compose.prod.yml run -T --rm workers \
              node_modules/.bin/prisma migrate deploy \
              --schema=packages/database/prisma/schema.prisma

            # Restart web + workers with new images (nginx and glitchtip keep running)
            docker compose -f docker-compose.prod.yml up -d --no-build web workers

            # Reload nginx to pick up any config changes (test first to avoid downtime)
            docker exec priovex-nginx nginx -t && docker exec priovex-nginx nginx -s reload

            # Remove dangling images to save disk space on the VM
            docker image prune -f

name: Deploy to Azure

# Triggers only after the CI workflow completes successfully on main
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout (pin to the exact SHA that passed CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Build & push web image ────────────────────────────────────────────
      - name: Build and push — web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/priovex-web:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/priovex-web:${{ github.event.workflow_run.head_sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          # Use previous latest as layer cache — dramatically speeds up rebuilds
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/priovex-web:latest
          cache-to: type=inline

      # ── Build & push workers image ────────────────────────────────────────
      - name: Build and push — workers
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/workers/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/priovex-workers:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/priovex-workers:${{ github.event.workflow_run.head_sha }}
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/priovex-workers:latest
          cache-to: type=inline

      # ── SSH into VM and roll out ──────────────────────────────────────────
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: ACR_LOGIN_SERVER,ACR_USERNAME,ACR_PASSWORD,IMAGE_TAG
          script: |
            set -e
            cd /opt/priovex

            # Write nginx config directly — avoids scp path ambiguity.
            # The bind mount (./nginx/default.conf) is read by nginx on reload.
            mkdir -p /opt/priovex/nginx
            cat > /opt/priovex/nginx/default.conf << 'NGINX_EOF'
            # ── HTTP: redirect to HTTPS + ACME challenge ──────────────────────────────
            server {
                listen 80;
                server_name priovex-app.centralindia.cloudapp.azure.com priovex.idpd.app errors.priovex.idpd.app;
                location /.well-known/acme-challenge/ { root /var/www/certbot; }
                location / { return 301 https://$host$request_uri; }
            }
            # ── HTTP fallback on 8080 ─────────────────────────────────────────────────
            server {
                listen 8080;
                server_name _;
                client_max_body_size 15m;
                location / {
                    resolver 127.0.0.11 valid=30s;
                    set $upstream http://web:3000;
                    proxy_pass $upstream;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                    proxy_cache_bypass $http_upgrade;
                    proxy_read_timeout 3600s;
                    proxy_send_timeout 3600s;
                    proxy_buffering off;
                    proxy_cache off;
                }
            }
            # ── HTTPS: Next.js web app ────────────────────────────────────────────────
            server {
                listen 443 ssl;
                http2 on;
                server_name priovex-app.centralindia.cloudapp.azure.com priovex.idpd.app;
                ssl_certificate     /etc/nginx/certs/app/fullchain.pem;
                ssl_certificate_key /etc/nginx/certs/app/privkey.pem;
                ssl_protocols       TLSv1.2 TLSv1.3;
                ssl_ciphers         HIGH:!aNULL:!MD5;
                ssl_session_cache   shared:SSL:10m;
                ssl_session_timeout 1d;
                client_max_body_size 15m;
                # GlitchTip event ingestion — /api/1/ routes to the glitchtip-web container.
                # Must be declared before the catch-all location / below.
                location /api/1/ {
                    resolver 127.0.0.11 valid=30s;
                    set $glitchtip http://glitchtip-web:8000;
                    proxy_pass         $glitchtip;
                    proxy_http_version 1.1;
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto https;
                    proxy_read_timeout 60s;
                    client_max_body_size 40m;
                }
                location / {
                    resolver 127.0.0.11 valid=30s;
                    set $upstream http://web:3000;
                    proxy_pass         $upstream;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection 'upgrade';
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto https;
                    proxy_cache_bypass $http_upgrade;
                    proxy_read_timeout  3600s;
                    proxy_send_timeout  3600s;
                    proxy_buffering off;
                    proxy_cache     off;
                }
            }
            NGINX_EOF

            # Authenticate with ACR
            echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin

            # Expose vars for docker-compose.prod.yml image substitution
            export ACR_LOGIN_SERVER="$ACR_LOGIN_SERVER"
            export IMAGE_TAG="$IMAGE_TAG"

            # Pull exact-SHA images just built in CI
            docker compose -f docker-compose.prod.yml pull web workers

            # Run DB migrations before switching traffic (uses DATABASE_DIRECT_URL from .env.prod)
            docker compose -f docker-compose.prod.yml run -T --rm workers \
              node_modules/.bin/prisma migrate deploy \
              --schema=packages/database/prisma/schema.prisma

            # Restart web + workers with new images (nginx and glitchtip keep running)
            docker compose -f docker-compose.prod.yml up -d --no-build web workers

            # Reload nginx with the freshly written config
            docker exec priovex-nginx nginx -t && docker exec priovex-nginx nginx -s reload

            # Remove dangling images to save disk space on the VM
            docker image prune -f

name: Make User Admin

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'User email to promote to ADMIN'
        required: true
        type: string

jobs:
  make-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Promote user to ADMIN on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/priovex
            # Load DATABASE_DIRECT_URL from .env.prod
            export $(grep '^DATABASE_DIRECT_URL=' .env.prod | xargs)
            # Install psql if not present
            which psql || (apt-get update -qq && apt-get install -y -qq postgresql-client)
            psql "$DATABASE_DIRECT_URL" -c "
              UPDATE users
              SET role = 'ADMIN',
                  \"subscriptionTier\" = 'ENTERPRISE',
                  \"searchQuotaLimit\" = -1
              WHERE email = '${{ github.event.inputs.email }}';
              SELECT email, role, \"subscriptionTier\", \"searchQuotaLimit\" FROM users WHERE email = '${{ github.event.inputs.email }}';
            "

# Initial nginx config — HTTP only, no SSL certs needed yet.
# Used before certbot runs. Switch to default.conf after certs are issued.

upstream nextjs {
    server web:3000;
}

upstream glitchtip {
    server glitchtip-web:8000;
}

# ACME challenge (for certbot)
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'PrioVex.AI — SSL setup in progress. Use port 8080 for now.';
        add_header Content-Type text/plain;
    }
}

# HTTP app on port 8080 (no SSL needed)
server {
    listen 8080;
    server_name _;

    client_max_body_size 15m;

    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
        proxy_cache     off;
    }
}

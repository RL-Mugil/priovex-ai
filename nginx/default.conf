# ── HTTP: redirect to HTTPS + ACME challenge ─────────────────────────────────
server {
    listen 80;
    server_name priovex-app.centralindia.cloudapp.azure.com priovex.idpd.app errors.priovex.idpd.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTP fallback on 8080 (pre-SSL / direct access without domain) ────────────
server {
    listen 8080;
    server_name _;

    client_max_body_size 15m;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://web:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
        proxy_cache     off;
    }
}

# ── HTTPS: Next.js web app ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name priovex-app.centralindia.cloudapp.azure.com priovex.idpd.app;

    ssl_certificate     /etc/nginx/certs/app/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 15m;

    # GlitchTip event ingestion — /api/1/ routes to the GlitchTip container.
    # The Sentry SDK posts to /api/1/envelope/ using the project-ID-based path.
    # This must appear before the catch-all location / below.
    location /api/1/ {
        resolver 127.0.0.11 valid=30s;
        set $glitchtip http://glitchtip-web:8000;
        proxy_pass         $glitchtip;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        client_max_body_size 40m;
    }

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://web:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
        proxy_cache     off;
    }
}


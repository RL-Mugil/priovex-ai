# ── Upstreams ──────────────────────────────────────────────────────────────────
upstream nextjs {
    server web:3000;
}

upstream glitchtip {
    server glitchtip-web:8000;
}

# ── HTTP: redirect all traffic to HTTPS + serve ACME challenge ────────────────
server {
    listen 80;
    server_name app.priovex.ai errors.priovex.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Next.js web app ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name app.priovex.ai;

    ssl_certificate     /etc/nginx/certs/app.priovex.ai/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/app.priovex.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Allow up to 15 MB uploads (PDF upload feature)
    client_max_body_size 15m;

    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;

        # WebSocket + SSE support
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Hold SSE streams open for the full search duration (45 min max)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Disable buffering so SSE events reach the client immediately
        proxy_buffering off;
        proxy_cache     off;
    }
}

# ── HTTPS: GlitchTip error tracking ──────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name errors.priovex.ai;

    ssl_certificate     /etc/nginx/certs/errors.priovex.ai/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/errors.priovex.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # GlitchTip accepts large error payloads with source maps
    client_max_body_size 40m;

    location / {
        proxy_pass         http://glitchtip;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

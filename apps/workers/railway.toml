[build]
  builder = "NIXPACKS"
  # Railway clones the full repo; cd ../.. reaches the monorepo root from apps/workers
  installCommand = "cd ../.. && npm ci"
  buildCommand = "cd ../.. && npx prisma generate --schema=packages/database/prisma/schema.prisma && npm run build --workspace=apps/workers"

[deploy]
  # Runs from apps/workers/ — dist/index.js is the esbuild bundle
  startCommand = "node dist/index.js"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 5
  numReplicas = 1
